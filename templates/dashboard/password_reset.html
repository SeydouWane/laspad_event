{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mot de passe oublié — LASPAD Event</title>
  <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--lp-green:#1a6b3a;--lp-gold:#c9a227;--lp-dark:#0f1f15;}
    body{font-family:'DM Sans',sans-serif;margin:0;}
    .form-input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;transition:all .2s;font-family:'DM Sans',sans-serif;background:#fafafa;color:#1f2937;}
    .form-input:focus{outline:none;border-color:var(--lp-green);box-shadow:0 0 0 3px rgba(26,107,58,.1);background:#fff;}
  </style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center px-4 py-12" style="background:#f8faf9;">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="{% static 'img/logo.png' %}" alt="LASPAD" class="h-14 mx-auto object-contain">
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">

      <!-- Header -->
      <div class="px-8 py-6" style="background:linear-gradient(135deg,#0f1f15,#1a6b3a);">
        <div class="flex items-center gap-3 mb-1">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:rgba(201,162,39,.2);">
            <svg class="w-5 h-5" style="color:#c9a227;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
            </svg>
          </div>
          <h1 class="text-xl font-bold text-white" style="font-family:'Sora',sans-serif;">
            Mot de passe oublié
          </h1>
        </div>
        <p class="text-sm mt-1" style="color:rgba(255,255,255,.6);">
          Saisissez votre email pour recevoir un lien de réinitialisation.
        </p>
      </div>

      <!-- Form -->
      <div class="px-8 py-6">
        <form method="post" novalidate>
          {% csrf_token %}

          <div class="mb-5">
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">
              Adresse email <span class="text-red-500">*</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
              </div>
              <input type="email" name="email" required autofocus
                     class="form-input" style="padding-left:2.75rem;"
                     placeholder="votre@email.com">
            </div>
            <p class="text-xs text-gray-400 mt-1.5">
              Entrez l'adresse email associée à votre compte administrateur.
            </p>
          </div>

          <button type="submit"
                  class="w-full py-3.5 rounded-xl text-white font-bold text-sm transition-all hover:shadow-lg hover:-translate-y-0.5"
                  style="background:linear-gradient(135deg,#1a6b3a,#2d8a52);font-family:'Sora',sans-serif;">
            <span class="flex items-center justify-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
              </svg>
              Envoyer le lien de réinitialisation
            </span>
          </button>
        </form>

        <div class="text-center mt-5">
          <a href="{% url 'dashboard:login' %}"
             class="text-sm text-gray-500 hover:text-green-700 transition-colors inline-flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Retour à la connexion
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
