{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mot de passe réinitialisé — LASPAD Event</title>
  <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>body{font-family:'DM Sans',sans-serif;margin:0;}</style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center px-4 py-12" style="background:#f8faf9;">
  <div class="w-full max-w-md text-center">

    <img src="{% static 'img/logo.png' %}" alt="LASPAD" class="h-14 mx-auto object-contain mb-8">

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
      <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5"
           style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);">
        <svg class="w-10 h-10" style="color:#1a6b3a;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-900 mb-3" style="font-family:'Sora',sans-serif;">
        Mot de passe réinitialisé !
      </h2>
      <p class="text-gray-500 text-sm leading-relaxed mb-6">
        Votre mot de passe a été modifié avec succès.
        Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
      </p>
      <a href="{% url 'dashboard:login' %}"
         class="inline-flex items-center gap-2 py-3 px-8 rounded-xl text-white font-bold text-sm hover:shadow-lg hover:-translate-y-0.5 transition-all"
         style="background:linear-gradient(135deg,#1a6b3a,#2d8a52);">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
        </svg>
        Se connecter maintenant
      </a>
    </div>
  </div>
</div>
</body>
</html>
